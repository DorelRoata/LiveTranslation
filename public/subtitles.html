<!DOCTYPE html>
<html>
<head>
  <title>Projector Screen - Live Subtitles</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #000000;
      color: #ffffff;
      font-family: 'Outfit', sans-serif;
      margin: 0;
      padding: 3rem;
      display: flex;
      flex-direction: column;
      height: 100vh;
      box-sizing: border-box;
      overflow: hidden;
      position: relative;
    }
    .status-dot {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: #f59e0b; /* Yellow/Amber by default (Connecting) */
      z-index: 10;
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 0 8px #f59e0b;
    }
    .container {
      display: flex;
      flex-direction: column;
      height: 100%;
      gap: 2rem;
      justify-content: center;
      transition: all 0.5s ease;
    }
    .section {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 2.5rem;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid rgba(255, 255, 255, 0.03);
      transition: all 0.5s ease;
      opacity: 1;
    }
    .section.hidden {
      display: none !important;
      opacity: 0;
    }
    .text {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: stretch;
      min-height: 10rem;
      max-height: 16.5rem;
      overflow: hidden;
      color: #ffffff;
      padding: 0 10%;
    }
    .sub-line {
      font-size: 3rem;
      font-weight: 600;
      line-height: 1.5;
      text-align: left;
      color: rgba(255,255,255,0.5);
    }
    .sub-line-active {
      font-size: 3.2rem;
      font-weight: 700;
      line-height: 1.5;
      text-align: left;
      color: #ffffff;
      min-height: 4.8rem;
    }

    /* Floating Control Bar Styles */
    .control-bar {
      position: absolute;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 1.5rem;
      background: rgba(18, 18, 29, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 0.5rem 1.5rem;
      border-radius: 30px;
      z-index: 100;
      align-items: center;
      transition: opacity 0.5s ease, transform 0.5s ease;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }
    .control-bar.hidden {
      opacity: 0;
      transform: translate(-50%, -20px);
      pointer-events: none;
    }
    .control-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .control-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 700;
    }
    .control-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #94a3b8;
      padding: 0.35rem 1.2rem;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      transition: all 0.3s ease;
      font-family: inherit;
      outline: none;
    }
    .control-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
    }
    .control-btn.active {
      background: #6366f1;
      border-color: rgba(99, 102, 241, 0.5);
      color: #ffffff;
      box-shadow: 0 0 12px rgba(99, 102, 241, 0.4);
    }
    .control-btn.audio-active {
      background: #10b981;
      border-color: rgba(16, 185, 129, 0.5);
      color: #ffffff;
      box-shadow: 0 0 12px rgba(16, 185, 129, 0.4);
    }
  </style>
</head>
<body>
  <div id="debug-dashboard" style="position: absolute; top: 1.5rem; left: 1.5rem; font-family: monospace; font-size: 0.75rem; color: rgba(255,255,255,0.4); pointer-events: none; z-index: 10; text-align: left; line-height: 1.4;">
    Ws Connected: <span id="dbg-connected" style="color: #ef4444; font-weight: bold;">No</span><br/>
    Total Msgs: <span id="dbg-total" style="color: #60a5fa; font-weight: bold;">0</span><br/>
    Last Msg: <span id="dbg-last" style="color: #34d399; font-weight: bold;">None</span><br/>
    Text 1 Length: <span id="dbg-len1" style="color: #a7f3d0; font-weight: bold;">0</span><br/>
    Text 2 Length: <span id="dbg-len2" style="color: #a7f3d0; font-weight: bold;">0</span>
  </div>
  <div class="status-dot" id="status-indicator" title="Connecting to Host..."></div>

  <!-- Floating Navigation Controls -->
  <div class="control-bar" id="control-bar">
    <div class="control-group">
      <span class="control-label">Layout:</span>
      <button class="control-btn active" id="btn-view-both">Both</button>
      <button class="control-btn" id="btn-view-lang1">Language 1</button>
      <button class="control-btn" id="btn-view-lang2" style="display: none;">Language 2</button>
    </div>
    <div style="width: 1px; height: 1.5rem; background: rgba(255,255,255,0.1);"></div>
    <div class="control-group">
      <span class="control-label">Audio:</span>
      <button class="control-btn" id="btn-audio-toggle">🔇 Disabled</button>
    </div>
  </div>

  <div class="container" id="subtitles-container">
    <div class="section" id="sec-lang1">
      <div class="text" id="sub-lang1">-</div>
    </div>
    <div class="section" id="sec-lang2" style="display: none;">
      <div class="text" id="sub-lang2">-</div>
    </div>
  </div>

  <script>
    window.onerror = function (msg, url, line) {
      const errDiv = document.getElementById('debug-error-log') || document.createElement('div');
      errDiv.id = 'debug-error-log';
      errDiv.style.position = 'absolute';
      errDiv.style.bottom = '1rem';
      errDiv.style.left = '1rem';
      errDiv.style.background = 'rgba(239, 68, 68, 0.9)';
      errDiv.style.color = '#fff';
      errDiv.style.padding = '0.5rem 1rem';
      errDiv.style.borderRadius = '8px';
      errDiv.style.fontSize = '0.8rem';
      errDiv.style.zIndex = '9999';
      errDiv.style.fontFamily = 'monospace';
      errDiv.textContent = `JS Error: ${msg} at line ${line}`;
      document.body.appendChild(errDiv);
      return false;
    };

    let subtitleState = {
      lang1: { accumulatedText: "" },
      lang2: { accumulatedText: "" },
      targetLanguage1: "",
      targetLanguage2: "",
      isDual: false
    };

    // DOM Elements
    const statusIndicator = document.getElementById('status-indicator');
    const controlBar = document.getElementById('control-bar');
    const btnViewBoth = document.getElementById('btn-view-both');
    const btnViewLang1 = document.getElementById('btn-view-lang1');
    const btnViewLang2 = document.getElementById('btn-view-lang2');
    const btnAudioToggle = document.getElementById('btn-audio-toggle');
    const secLang1 = document.getElementById('sec-lang1');
    const secLang2 = document.getElementById('sec-lang2');

    // UI state configurations
    let viewMode = 'both'; // 'both', 'lang1', 'lang2'
    let audioEnabled = false;
    
    // Audio contexts & playback state
    let audioContext = null;
    let nextStartTime1 = 0;
    let nextStartTime2 = 0;

    // Language code to full names mappings for buttons
    const LANG_NAMES = {
      'en': 'English', 'es': 'Spanish', 'fr': 'French', 'de': 'German',
      'it': 'Italian', 'ro': 'Romanian', 'ja': 'Japanese', 'ru': 'Russian',
      'zh-Hans': 'Chinese (Simp)', 'zh-Hant': 'Chinese (Trad)', 'pt': 'Portuguese',
      'ko': 'Korean', 'pl': 'Polish', 'hi': 'Hindi', 'ar': 'Arabic',
      'tr': 'Turkish', 'vi': 'Vietnamese'
    };

    function getLanguageName(code, fallback) {
      if (!code) return fallback;
      return LANG_NAMES[code.toLowerCase()] || code.toUpperCase();
    }

    // Auto-hide controls bar on mouse inactivity
    let mouseTimeout;
    function resetMouseTimer() {
      controlBar.classList.remove('hidden');
      clearTimeout(mouseTimeout);
      mouseTimeout = setTimeout(() => {
        if (!controlBar.matches(':hover')) {
          controlBar.classList.add('hidden');
        }
      }, 3000);
    }
    window.addEventListener('mousemove', resetMouseTimer);
    resetMouseTimer();

    // View toggling logic
    btnViewBoth.addEventListener('click', () => {
      viewMode = 'both';
      updateUIElements();
    });
    btnViewLang1.addEventListener('click', () => {
      viewMode = 'lang1';
      updateUIElements();
    });
    btnViewLang2.addEventListener('click', () => {
      viewMode = 'lang2';
      updateUIElements();
    });

    // Audio Playback context initialisation and toggling
    btnAudioToggle.addEventListener('click', () => {
      audioEnabled = !audioEnabled;
      if (audioEnabled) {
        initAudioContext();
        btnAudioToggle.classList.add('audio-active');
        btnAudioToggle.textContent = '🔊 Enabled';
      } else {
        btnAudioToggle.classList.remove('audio-active');
        btnAudioToggle.textContent = '🔇 Disabled';
      }
    });

    function initAudioContext() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)({
          sampleRate: 24000
        });
      }
      if (audioContext.state === "suspended") {
        audioContext.resume();
      }
    }

    // Split accumulated text into stable lines of ~50 chars at word boundaries
    function splitIntoLines(text, maxChars = 50) {
      if (!text) return { complete: [], partial: "" };
      const words = text.split(/\s+/);
      const lines = [];
      let current = "";
      for (const word of words) {
        if (current.length + word.length + 1 > maxChars && current.length > 0) {
          lines.push(current);
          current = word;
        } else {
          current = current ? current + " " + word : word;
        }
      }
      return { complete: lines, partial: current || "" };
    }

    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    // Track what's on screen to avoid unnecessary DOM updates
    const lastRendered = { lang1: "", lang2: "" };

    function renderSubtitleLane(lane) {
      if (viewMode === 'lang1' && lane !== 'lang1') return;
      if (viewMode === 'lang2' && lane !== 'lang2') return;

      const state = subtitleState[lane];
      const element = document.getElementById(`sub-${lane}`);
      if (!element) return;

      const { complete, partial } = splitIntoLines(state.accumulatedText);

      // Cache key includes complete lines AND the partial text
      const cacheKey = complete.slice(-2).join("|") + "||" + partial;
      if (lastRendered[lane] === cacheKey) return;
      lastRendered[lane] = cacheKey;

      // Build HTML: up to 2 stable history lines + 1 active typing line
      const historyLines = complete.slice(-2);
      let html = historyLines
        .map(line => `<div class="sub-line">${escapeHtml(line)}</div>`)
        .join("");

      // Active line — shows the partial text being typed right now
      html += `<div class="sub-line-active">${partial ? escapeHtml(partial) : "&nbsp;"}</div>`;

      element.innerHTML = html;
    }

    function renderInterimSubtitle(lane, text) {
      renderSubtitleLane(lane);
    }

    function updateUIElements() {
      // 1. Language buttons text
      btnViewLang1.textContent = getLanguageName(subtitleState.targetLanguage1, 'Language 1');
      
      const isDualAvailable = subtitleState.isDual && subtitleState.targetLanguage2 !== 'none';
      if (isDualAvailable) {
        btnViewLang2.style.display = 'inline-block';
        btnViewLang2.textContent = getLanguageName(subtitleState.targetLanguage2, 'Language 2');
        btnViewBoth.style.display = 'inline-block';
      } else {
        btnViewLang2.style.display = 'none';
        btnViewBoth.style.display = 'none';
        if (viewMode === 'both' || viewMode === 'lang2') {
          viewMode = 'lang1';
        }
      }

      // 2. Active buttons selection styling
      btnViewBoth.classList.toggle('active', viewMode === 'both');
      btnViewLang1.classList.toggle('active', viewMode === 'lang1');
      btnViewLang2.classList.toggle('active', viewMode === 'lang2');

      // 3. Grid Columns Visibility
      if (viewMode === 'both') {
        secLang1.classList.remove('hidden');
        secLang1.style.display = 'flex';
        secLang2.classList.remove('hidden');
        secLang2.style.display = 'flex';
      } else if (viewMode === 'lang1') {
        secLang1.classList.remove('hidden');
        secLang1.style.display = 'flex';
        secLang2.classList.add('hidden');
      } else if (viewMode === 'lang2') {
        secLang1.classList.add('hidden');
        secLang2.classList.remove('hidden');
        secLang2.style.display = 'flex';
      }
    }

    // Audio Playback Engine
    function playPCMChunk(base64Data, channelId) {
      if (!audioEnabled || !audioContext) return;

      // Drop audio playback if that language is currently hidden by View Mode
      if (viewMode === 'lang1' && channelId !== 1) return;
      if (viewMode === 'lang2' && channelId !== 2) return;

      try {
        initAudioContext();

        // 1. Decode base64
        const binaryString = atob(base64Data);
        const len = binaryString.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) {
          bytes[i] = binaryString.charCodeAt(i);
        }

        // 2. Convert raw little-endian 16-bit PCM bytes to Float32
        const pcm16 = new Int16Array(bytes.buffer);
        const float32 = new Float32Array(pcm16.length);
        for (let i = 0; i < pcm16.length; i++) {
          float32[i] = pcm16[i] / 32768.0;
        }

        // 3. Create AudioBuffer
        const audioBuffer = audioContext.createBuffer(1, float32.length, 24000);
        audioBuffer.copyToChannel(float32, 0);

        // 4. Connect source node
        const sourceNode = audioContext.createBufferSource();
        sourceNode.buffer = audioBuffer;
        sourceNode.connect(audioContext.destination);

        const now = audioContext.currentTime;
        let nextStart = channelId === 1 ? nextStartTime1 : nextStartTime2;
        if (nextStart < now) {
          nextStart = now;
        }

        sourceNode.start(nextStart);

        if (channelId === 1) {
          nextStartTime1 = nextStart + audioBuffer.duration;
        } else {
          nextStartTime2 = nextStart + audioBuffer.duration;
        }
      } catch (err) {
        console.error("Subtitles player failed to play PCM audio:", err);
      }
    }

    function connect() {
      const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${wsProtocol}//${window.location.host}/local-subtitles-ws`;
      
      statusIndicator.style.backgroundColor = "#f59e0b"; // Yellow (Connecting)
      statusIndicator.style.boxShadow = "0 0 8px #f59e0b";
      statusIndicator.title = "Connecting to Host...";
      
      const socket = new WebSocket(wsUrl);

      let totalMsgs = 0;

      socket.onopen = () => {
        statusIndicator.style.backgroundColor = "#10b981"; // Green (Connected)
        statusIndicator.style.boxShadow = "0 0 8px #10b981";
        statusIndicator.title = "Connected to Host";
        const connEl = document.getElementById("dbg-connected");
        if (connEl) {
          connEl.textContent = "Yes";
          connEl.style.color = "#10b981";
        }
      };

      socket.onmessage = (event) => {
        totalMsgs++;
        const totEl = document.getElementById("dbg-total");
        if (totEl) totEl.textContent = totalMsgs;

        try {
          const data = JSON.parse(event.data);
          const lastEl = document.getElementById("dbg-last");
          if (lastEl) lastEl.textContent = `${data.type} (lane: ${data.lane || 'N/A'})`;
          
          if (data.type === 'sync') {
            subtitleState = data.state;
            const l1El = document.getElementById("dbg-len1");
            const l2El = document.getElementById("dbg-len2");
            if (l1El) l1El.textContent = subtitleState.lang1.accumulatedText.length;
            if (l2El) l2El.textContent = subtitleState.lang2.accumulatedText.length;
            
            updateUIElements();
            renderSubtitleLane("lang1");
            renderSubtitleLane("lang2");
          } else if (data.type === 'update') {
            renderInterimSubtitle(data.lane, data.text);
          } else if (data.type === 'audio') {
            playPCMChunk(data.audioData, data.channelId);
          }
        } catch (err) {
          console.error("Error parsing WebSocket message:", err);
          window.onerror(err.message, "", 0);
        }
      };

      socket.onclose = () => {
        statusIndicator.style.backgroundColor = "#ef4444"; // Red (Disconnected)
        statusIndicator.style.boxShadow = "0 0 8px #ef4444";
        statusIndicator.title = "Disconnected (Retrying...)";
        setTimeout(connect, 3000);
      };

      socket.onerror = () => {
        socket.close();
      };
    }

    connect();
  </script>
</body>
</html>
